<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}solidity-audit-ai: Smart contract security audit{% endblock %}</title>
  <meta name="description" content="Paste a Solidity contract and get an instant security audit: 10 static detectors mapped to SWC IDs plus fix-ready remediation. Crypto-modern, fully offline, no keys, no source upload." />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#070a14" />

  <!-- Theme: set the class before paint to avoid a flash. Dark is the default. -->
  <script>
    (function () {
      try {
        var k = "solaudit-theme", s = localStorage.getItem(k);
        var dark = s ? s === "dark" : true; // crypto-modern: dark by default
        document.documentElement.classList.toggle("dark", dark);
      } catch (e) {}
    })();
  </script>

  <!-- Vendored offline: Tailwind (Play CDN, JIT). No network required. -->
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Geist", "Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            mono: ["Geist Mono", "ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
          },
          colors: {
            // Brand = electric crypto. cyan-forward with violet at the deep end,
            // so existing brand-* utilities adopt the new identity.
            brand: {
              50: "#ecfeff", 100: "#cffafe", 200: "#a5f3fc", 300: "#67e8f9",
              400: "#22d3ee", 500: "#06b6d4", 600: "#0891b2", 700: "#7c3aed",
              800: "#6d28d9", 900: "#4c1d95",
            },
            ink: {
              900: "#070a14", 850: "#0a0e1a", 800: "#0f1421", 700: "#141a2b",
            },
          },
          boxShadow: {
            glow: "0 0 40px -8px rgba(34,211,238,0.45)",
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="/static/js/app.js"></script>
</head>
<body class="sa-bg min-h-screen text-slate-800 antialiased dark:text-slate-200">

  {% include "partials/nav.html" %}

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 lg:py-10">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}
</body>
</html>

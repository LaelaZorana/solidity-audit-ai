<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}solidity-audit-ai — Smart contract security audit{% endblock %}</title>
  <meta name="description" content="Paste a Solidity contract and get an instant security audit: 10 static detectors mapped to SWC IDs plus fix-ready remediation. Runs fully offline, no keys, no source upload." />

  <!-- Theme: set the class before paint to avoid a flash of the wrong theme. -->
  <script>
    (function () {
      try {
        var k = "solaudit-theme", s = localStorage.getItem(k);
        var dark = s ? s === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {}
    })();
  </script>

  <!-- Vendored offline: Tailwind (Play CDN, JIT). No network required. -->
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
          colors: {
            brand: {
              50: "#eef2ff", 100: "#e0e7ff", 200: "#c7d2fe", 300: "#a5b4fc",
              400: "#818cf8", 500: "#6366f1", 600: "#4f46e5", 700: "#4338ca",
              800: "#3730a3", 900: "#312e81",
            },
          },
        },
      },
    };
  </script>

  <!-- Inter (online nicety; system sans is the offline fallback). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="/static/js/app.js"></script>
</head>
<body class="sa-bg min-h-screen bg-slate-50 text-slate-800 antialiased dark:bg-slate-950 dark:text-slate-200">

  {% include "partials/nav.html" %}

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 lg:py-10">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}
</body>
</html>

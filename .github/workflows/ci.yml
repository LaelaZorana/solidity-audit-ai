name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (offline)
        run: pytest -q

      - name: Run the sample audit (self-check)
        run: |
          python -m auditor.cli samples --format json > audit.json
          python -m auditor.cli samples --md report.md --html report.html
          test -s report.html && test -s report.md

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ matrix.python-version }}
          path: |
            report.html
            report.md
            audit.json
          if-no-files-found: ignore

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t solidity-audit-ai:ci .
      - name: Smoke-test the image (CLI)
        run: |
          docker run --rm solidity-audit-ai:ci \
            python -m auditor.cli samples --format json > /dev/null
